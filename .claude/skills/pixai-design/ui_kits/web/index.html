<!doctype html>
<!-- @dsCard group="UI Kit — Web" name="PixAI web · home" subtitle="Full web app recreation" viewport="1440x900" -->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>PixAI · Web UI Kit</title>
  <meta name="viewport" content="width=1440" />
  <link rel="stylesheet" href="../../colors_and_type.css" />
  <style>
    html, body { background: var(--bg); }
    #root { min-height: 100vh; }
    button:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }
    *::-webkit-scrollbar { width: 10px; height: 10px; }
    *::-webkit-scrollbar-thumb { background: var(--border); border-radius: 9999px; }
  </style>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="Primitives.jsx"></script>
  <script type="text/babel" src="Navigation.jsx"></script>
  <script type="text/babel" src="PromptComposer.jsx"></script>
  <script type="text/babel" src="ImageGrid.jsx"></script>
  <script type="text/babel" src="Hero.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const MODELS = [
      { title: 'Tsubaki 2.0',    author: 'PixAI',  likes: '42k', premium: true,  bg: 'linear-gradient(135deg,#C9A7F0,#7E22CE)' },
      { title: 'Mio · catgirl',  author: '@mewtant', likes: '18k', image: '../../assets/mio-mascot.png' },
      { title: 'Neo-noir anime', author: '@kuro',  likes: '9.1k', bg: 'linear-gradient(135deg,#3B2250,#8B27AE)' },
      { title: 'Pastel shoujo',  author: '@luna',  likes: '7.4k', bg: 'linear-gradient(135deg,#FB7188,#EA79F1)' },
      { title: 'Chibi friends',  author: '@momo',  likes: '5.2k', bg: 'linear-gradient(135deg,#EEE5F6,#B27AE2)' },
      { title: 'Sailor academy', author: '@aoi',   likes: '4.8k', bg: 'linear-gradient(135deg,#9535EA,#FB7188)' },
      { title: 'Fantasy knight', author: '@rei',   likes: '3.9k', premium: true, bg: 'linear-gradient(160deg,#7E22CE,#140A1F)' },
      { title: 'Low-key cafe',   author: '@yui',   likes: '3.1k', bg: 'linear-gradient(135deg,#FBF8FE,#B27AE2)' },
    ];

    function App() {
      const [tab, setTab] = useState('Generate');
      const [rail, setRail] = useState('home');
      const [items, setItems] = useState(MODELS);
      const [generating, setGenerating] = useState(false);

      useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [tab, rail, items, generating]);

      function onGenerate() {
        setGenerating(true);
        setTimeout(() => {
          setGenerating(false);
          const fresh = [
            { title: 'Your creation · 1', author: '@you', likes: 'just now', bg: 'linear-gradient(135deg,#EA79F1,#FB7188)' },
            { title: 'Your creation · 2', author: '@you', likes: 'just now', image: '../../assets/mio-mascot.png' },
            { title: 'Your creation · 3', author: '@you', likes: 'just now', bg: 'linear-gradient(135deg,#9535EA,#EA79F1)' },
            { title: 'Your creation · 4', author: '@you', likes: 'just now', bg: 'linear-gradient(135deg,#B27AE2,#EEE5F6)' },
          ];
          setItems([...fresh, ...MODELS]);
        }, 2000);
      }

      return (
        <div>
          <TopNav tab={tab} onTab={setTab} />
          <div style={{ display: 'grid', gridTemplateColumns: '220px 1fr', alignItems: 'start' }}>
            <SideRail active={rail} onPick={setRail} />
            <main style={{ padding: 32, maxWidth: 1180 }}>
              <HeroBanner />
              <div style={{ display: 'grid', gridTemplateColumns: '400px 1fr', gap: 24, marginTop: 32, alignItems: 'start' }}>
                <PromptComposer onGenerate={onGenerate} />
                <div>
                  <SectionHeader
                    title={generating ? 'Generating your batch…' : 'Recent & featured'}
                    subtitle={generating ? 'This usually takes 10–15 seconds.' : 'Curated from the Model Market this week.'}
                    action="See all"
                  />
                  <ImageGrid items={items} generating={generating} />
                </div>
              </div>
            </main>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
