<!doctype html>
<!-- @dsCard group="Colors" name="Neutrals" subtitle="Cool-white 0–800 with lavender undertone" viewport="700x130" --><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px 24px; background: var(--bg); }
  .row { display: grid; grid-template-columns: repeat(10, 1fr); gap: 8px; }
  .s { display: flex; flex-direction: column; gap: 4px; }
  .chip { height: 48px; border-radius: var(--radius-sm); box-shadow: var(--shadow-xs); }
  .n { font-size: 10px; font-family: var(--font-mono); color: var(--fg-muted); text-align: center; }
</style></head>
<body>
  <div class="row">
    <div class="s"><div class="chip" style="background:#FFFFFF;border:1px solid var(--border)"></div><div class="n">0</div></div>
    <div class="s"><div class="chip" style="background:#FBF8FE;border:1px solid var(--border-soft)"></div><div class="n">50</div></div>
    <div class="s"><div class="chip" style="background:#F5EFFA"></div><div class="n">100</div></div>
    <div class="s"><div class="chip" style="background:#EBE3F3"></div><div class="n">200</div></div>
    <div class="s"><div class="chip" style="background:#D9CEE6"></div><div class="n">300</div></div>
    <div class="s"><div class="chip" style="background:#A799B8"></div><div class="n">400</div></div>
    <div class="s"><div class="chip" style="background:#786B8A"></div><div class="n">500</div></div>
    <div class="s"><div class="chip" style="background:#554A66"></div><div class="n">600</div></div>
    <div class="s"><div class="chip" style="background:#372E45"></div><div class="n">700</div></div>
    <div class="s"><div class="chip" style="background:#1F1729"></div><div class="n">800</div></div>
  </div>
  <div style="font-size:12px;color:var(--fg-muted);margin-top:14px">Cool-white neutrals with faint lavender undertone — never pure #fff on surfaces.</div>
</body></html>
