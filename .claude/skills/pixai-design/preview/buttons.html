<!doctype html>
<!-- @dsCard group="Components" name="Buttons" subtitle="Primary, gradient CTA, ghost, soft" viewport="700x110" --><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px 24px; background: var(--bg); display: flex; flex-direction: column; gap: 14px; align-items: flex-start; }
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .btn { font-family: var(--font-body); font-weight: 500; border: 0; cursor: pointer; transition: all var(--dur-fast) var(--ease-out); }
  .btn.primary { background: var(--primary); color: #fff; padding: 10px 20px; border-radius: var(--radius-full); box-shadow: var(--shadow-sm); }
  .btn.primary:hover { background: var(--primary-hover); box-shadow: var(--shadow-md); }
  .btn.generate { background: var(--pix-gradient); color: #fff; padding: 12px 24px; border-radius: var(--radius-full); box-shadow: var(--shadow-glow); font-weight: 700; }
  .btn.ghost { background: transparent; color: var(--primary); padding: 10px 20px; border: 1.5px solid var(--primary); border-radius: var(--radius-full); }
  .btn.soft { background: var(--primary-soft); color: var(--primary); padding: 10px 20px; border-radius: var(--radius-full); }
  .btn.small { font-size: 13px; padding: 6px 14px; }
</style></head>
<body>
  <div class="row">
    <button class="btn primary">Generate</button>
    <button class="btn generate">✨ Generate</button>
    <button class="btn ghost">Edit</button>
    <button class="btn soft">Save</button>
    <button class="btn primary small">Follow</button>
  </div>
</body></html>
