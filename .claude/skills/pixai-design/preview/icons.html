<!doctype html>
<!-- @dsCard group="Components" name="Icons (Lucide)" subtitle="CDN substitute · 1.75 stroke" viewport="700x130" --><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  body { padding: 20px 24px; background: var(--bg); display: flex; flex-wrap: wrap; gap: 16px; align-items: center; }
  .ic { display: flex; flex-direction: column; align-items: center; gap: 6px; color: var(--fg-muted); }
  .ic i { color: var(--primary); }
  .lbl { font-family: var(--font-mono); font-size: 10px; }
</style></head>
<body>
  <div class="ic"><i data-lucide="sparkles" width="28" height="28" stroke-width="1.75"></i><span class="lbl">sparkles</span></div>
  <div class="ic"><i data-lucide="wand-2" width="28" height="28" stroke-width="1.75"></i><span class="lbl">wand-2</span></div>
  <div class="ic"><i data-lucide="image" width="28" height="28" stroke-width="1.75"></i><span class="lbl">image</span></div>
  <div class="ic"><i data-lucide="film" width="28" height="28" stroke-width="1.75"></i><span class="lbl">film</span></div>
  <div class="ic"><i data-lucide="layers" width="28" height="28" stroke-width="1.75"></i><span class="lbl">layers</span></div>
  <div class="ic"><i data-lucide="heart" width="28" height="28" stroke-width="1.75"></i><span class="lbl">heart</span></div>
  <div class="ic"><i data-lucide="star" width="28" height="28" stroke-width="1.75"></i><span class="lbl">star</span></div>
  <div class="ic"><i data-lucide="trophy" width="28" height="28" stroke-width="1.75"></i><span class="lbl">trophy</span></div>
  <div class="ic"><i data-lucide="users" width="28" height="28" stroke-width="1.75"></i><span class="lbl">users</span></div>
  <div class="ic"><i data-lucide="user-circle" width="28" height="28" stroke-width="1.75"></i><span class="lbl">user</span></div>
  <script>lucide.createIcons();</script>
</body></html>
