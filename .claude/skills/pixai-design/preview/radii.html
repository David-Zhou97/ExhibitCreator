<!doctype html>
<!-- @dsCard group="Spacing" name="Corner radii" subtitle="xs → full" viewport="700x140" --><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 18px 24px; background: var(--bg); display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; }
  .s { display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .box { background: var(--surface); border: 1px solid var(--border-soft); }
  .n { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); }
  .l { font-size: 11px; color: var(--fg); }
</style></head>
<body>
  <div class="s"><div class="box" style="width:48px;height:48px;border-radius:6px"></div><div class="l">xs</div><div class="n">6px</div></div>
  <div class="s"><div class="box" style="width:48px;height:48px;border-radius:10px"></div><div class="l">sm</div><div class="n">10px</div></div>
  <div class="s"><div class="box" style="width:48px;height:48px;border-radius:16px"></div><div class="l">md</div><div class="n">16px</div></div>
  <div class="s"><div class="box" style="width:48px;height:48px;border-radius:24px"></div><div class="l">lg</div><div class="n">24px</div></div>
  <div class="s"><div class="box" style="width:48px;height:48px;border-radius:32px"></div><div class="l">xl</div><div class="n">32px</div></div>
  <div class="s"><div class="box" style="width:48px;height:48px;border-radius:9999px"></div><div class="l">full</div><div class="n">9999</div></div>
</body></html>
