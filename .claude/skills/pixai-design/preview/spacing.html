<!doctype html>
<!-- @dsCard group="Spacing" name="Spacing scale" subtitle="4px base, t-shirt sizes" viewport="700x140" --><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px 24px; background: var(--bg); display: grid; grid-template-columns: repeat(8, 1fr); gap: 10px; align-items: end; }
  .s { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .box { background: var(--pix-gradient-2); border-radius: 4px; width: 100%; }
  .n { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); }
  .l { font-size: 11px; color: var(--fg); }
</style></head>
<body>
  <div class="s"><div class="box" style="height:4px"></div><div class="l">2</div><div class="n">2</div></div>
  <div class="s"><div class="box" style="height:8px"></div><div class="l">3</div><div class="n">8</div></div>
  <div class="s"><div class="box" style="height:12px"></div><div class="l">4</div><div class="n">12</div></div>
  <div class="s"><div class="box" style="height:16px"></div><div class="l">5</div><div class="n">16</div></div>
  <div class="s"><div class="box" style="height:24px"></div><div class="l">7</div><div class="n">24</div></div>
  <div class="s"><div class="box" style="height:32px"></div><div class="l">8</div><div class="n">32</div></div>
  <div class="s"><div class="box" style="height:48px"></div><div class="l">9</div><div class="n">48</div></div>
  <div class="s"><div class="box" style="height:64px"></div><div class="l">10</div><div class="n">64</div></div>
</body></html>
