<!doctype html>
<!-- @dsCard group="Components" name="Inputs & chips" subtitle="Prompt field + style chips" viewport="700x170" --><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px 24px; background: var(--bg); display: flex; flex-direction: column; gap: 12px; }
  .field { display: flex; flex-direction: column; gap: 6px; max-width: 420px; }
  label { font-size: 12px; color: var(--fg-muted); font-weight: 500; }
  input, textarea { font-family: var(--font-body); font-size: 15px; padding: 10px 14px; border-radius: var(--radius-sm); border: 1.5px solid var(--border); background: var(--surface); color: var(--fg); outline: none; transition: border-color var(--dur-fast); }
  input:focus, textarea:focus { border-color: var(--primary); }
  .chip-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .chip { padding: 5px 12px; border-radius: var(--radius-full); background: var(--primary-soft); color: var(--primary); font-size: 13px; font-weight: 500; }
  .chip.on { background: var(--pix-gradient); color: #fff; }
</style></head>
<body>
  <div class="field">
    <label>PROMPT</label>
    <input placeholder="1girl, white hair, cat ears, sailor uniform..." value="1girl, silver hair, cat ears, sailor uniform, soft lighting">
  </div>
  <div class="chip-row">
    <span class="chip on">Anime</span>
    <span class="chip">Realistic</span>
    <span class="chip">Fantasy</span>
    <span class="chip">Chibi</span>
  </div>
</body></html>
