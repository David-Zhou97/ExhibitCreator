<!doctype html>
<!-- @dsCard group="Colors" name="Brand colors · dark" subtitle="Dark-mode counterparts" viewport="700x160" --><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px 24px; background: #140A1F; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .s { display: flex; flex-direction: column; gap: 6px; }
  .chip { height: 72px; border-radius: var(--radius-md); box-shadow: var(--shadow-sm); }
  .name { font-size: 13px; font-weight: 500; color: #F5EFFA; }
  .hex { font-family: var(--font-mono); color: #A799B8; font-size: 11px; }
</style></head>
<body>
  <div class="grid">
    <div class="s"><div class="chip" style="background:#8B27AE"></div><div class="name">pixPurpleDark</div><div class="hex">#8B27AE</div></div>
    <div class="s"><div class="chip" style="background:#B27AE2"></div><div class="name">pixPurpleLiteDark</div><div class="hex">#B27AE2</div></div>
    <div class="s"><div class="chip" style="background:#3B2250"></div><div class="name">pixPurpleSuperLiteDark</div><div class="hex">#3B2250</div></div>
    <div class="s"><div class="chip" style="background:#FB7188"></div><div class="name">pixPinkDark</div><div class="hex">#FB7188</div></div>
  </div>
</body></html>
