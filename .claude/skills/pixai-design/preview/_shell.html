<!-- Shared preview card chrome: 700x<variable>, padded, pixai-tinted -->
<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { background: var(--bg); }
  body { padding: 20px 24px; box-sizing: border-box; }
  .card-grid { display: grid; gap: 12px; }
  .swatch { display: flex; align-items: center; gap: 12px; }
  .chip { width: 56px; height: 56px; border-radius: var(--radius-md); box-shadow: var(--shadow-xs); flex: 0 0 auto; }
  .meta { display: flex; flex-direction: column; gap: 2px; }
  .hex { font-family: var(--font-mono); color: var(--fg-muted); font-size: 12px; }
  .name { font-weight: 500; }
</style>
</head><body></body></html>
