<!doctype html>
<!-- @dsCard group="Brand" name="Key art" subtitle="Seasonal hero illustrations" viewport="700x320" --><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 18px 24px; background: var(--bg); display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .tile { border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-sm); position: relative; aspect-ratio: 16/9; background-size: cover; background-position: center; }
  .fireplace { background-image: url('../assets/key-art-fireplace.png'); }
  .lanterns  { background-image: url('../assets/key-art-lanterns.png'); }
  .lbl { position: absolute; left: 10px; bottom: 10px; background: rgba(255,255,255,0.82); backdrop-filter: blur(10px); color: var(--pix-800); font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 9999px; font-family: var(--font-mono); letter-spacing: 0.02em; }
</style></head>
<body>
  <div class="tile fireplace"><span class="lbl">key-art-fireplace.png · winter / holiday</span></div>
  <div class="tile lanterns"><span class="lbl">key-art-lanterns.png · festival / new year</span></div>
</body></html>
