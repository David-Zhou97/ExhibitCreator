<!doctype html>
<!-- @dsCard group="Colors" name="Brand colors · light" subtitle="pixPurple family + pink accent" viewport="700x160" --><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px 24px; background: var(--bg); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .s { display: flex; flex-direction: column; gap: 6px; }
  .chip { height: 72px; border-radius: var(--radius-md); box-shadow: var(--shadow-xs); }
  .name { font-size: 13px; font-weight: 500; color: var(--fg); }
  .hex { font-family: var(--font-mono); color: var(--fg-muted); font-size: 11px; }
</style></head>
<body>
  <div class="grid">
    <div class="s"><div class="chip" style="background:#7E22CE"></div><div class="name">pixPurple</div><div class="hex">#7E22CE</div></div>
    <div class="s"><div class="chip" style="background:#B27AE2"></div><div class="name">pixPurpleLite</div><div class="hex">#B27AE2</div></div>
    <div class="s"><div class="chip" style="background:#EEE5F6;border:1px solid var(--border-soft)"></div><div class="name">pixPurpleSuperLite</div><div class="hex">#EEE5F6</div></div>
    <div class="s"><div class="chip" style="background:#F75C75"></div><div class="name">pixPinkAccent</div><div class="hex">#F75C75</div></div>
  </div>
</body></html>
