<!doctype html>
<!-- @dsCard group="Brand" name="Voice & copy examples" subtitle="Tone samples across surfaces" viewport="700x200" --><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 18px 24px; background: var(--bg); display: flex; flex-direction: column; gap: 12px; }
  .row { display: flex; align-items: center; gap: 10px; }
  .ex { font-family: var(--font-body); color: var(--fg); font-size: 15px; }
  .ex.hero { font-family: var(--font-display); font-size: 26px; font-weight: 900; background: var(--pix-gradient); -webkit-background-clip: text; background-clip: text; color: transparent; letter-spacing: -0.01em; }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); background: var(--surface); padding: 2px 8px; border-radius: var(--radius-full); border: 1px solid var(--border-soft); flex: 0 0 auto; }
</style></head>
<body>
  <div class="row"><div class="lbl">HERO</div><div class="ex hero">Turn ideas into art</div></div>
  <div class="row"><div class="lbl">PROMISE</div><div class="ex">Your creative journey starts here.</div></div>
  <div class="row"><div class="lbl">CTA</div><div class="ex" style="font-weight:700;color:var(--primary)">Start creating for free →</div></div>
  <div class="row"><div class="lbl">MICRO</div><div class="ex" style="font-size:13px;color:var(--fg-muted)">◆ 1,240 credits · renews monthly</div></div>
