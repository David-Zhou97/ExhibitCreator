<!doctype html>
<!-- @dsCard group="Brand" name="Logo" subtitle="Mark (SVG) + horizontal lockup" viewport="700x260" --><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 18px 24px; background: var(--bg); display: flex; flex-direction: column; gap: 14px; }
  .row { display: flex; align-items: center; gap: 22px; }
  .mark { width: 96px; height: 96px; flex: 0 0 auto; }
  .lockup { height: 72px; flex: 0 0 auto; }
  .sub { color: var(--fg-muted); font-size: 12px; font-family: var(--font-mono); letter-spacing: 0.02em; }
  .name { font-size: 13px; font-weight: 500; color: var(--fg); margin-bottom: 2px; }
</style></head>
<body>
  <div class="row">
    <img class="mark" src="../assets/pixai-logo-mark.svg" alt="PixAI mark">
    <div>
      <div class="name">Logo mark</div>
      <div class="sub">pixai-logo-mark.svg · 446×446 rounded square, white glyph on black</div>
    </div>
  </div>
  <div class="row">
    <img class="lockup" src="../assets/pixai-logo-lockup.png" alt="PixAI lockup">
    <div>
      <div class="name">Horizontal lockup</div>
      <div class="sub">pixai-logo-lockup.png · mark + wordmark</div>
    </div>
  </div>
</body></html>
