<!doctype html>
<!-- @dsCard group="Components" name="Cards" subtitle="Model / featured card patterns" viewport="700x300" --><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px 24px; background: var(--bg); display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .card { background: var(--surface); border-radius: var(--radius-md); box-shadow: var(--shadow-sm); overflow: hidden; }
  .thumb { aspect-ratio: 1 / 1; background: linear-gradient(135deg, #EEE5F6, #B27AE2); position: relative; }
  .thumb.mio { background: url('../assets/mio-mascot.png') center/contain no-repeat, #FBF8FE; }
  .body { padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; }
  .title { font-size: 14px; font-weight: 500; color: var(--fg); }
  .meta { font-size: 12px; color: var(--fg-muted); font-family: var(--font-mono); }
  .pill { font-size: 11px; background: var(--pix-gradient); color: #fff; padding: 3px 10px; border-radius: var(--radius-full); font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; }
</style></head>
<body>
  <div class="card">
    <div class="thumb mio"></div>
    <div class="body"><div><div class="title">Mio · cat-girl sailor</div><div class="meta">SDXL · LoRA</div></div><span class="pill">Pro</span></div>
  </div>
  <div class="card" style="box-shadow:var(--shadow-md)">
    <div class="thumb"></div>
    <div class="body"><div><div class="title">Featured model card</div><div class="meta">★ 4.9 · 12.3k</div></div></div>
  </div>
</body></html>
