<!doctype html>
<!-- @dsCard group="Spacing" name="Shadows" subtitle="Violet-tinted elevation + glow" viewport="700x140" --><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; background: var(--bg); display: grid; grid-template-columns: repeat(5, 1fr); gap: 18px; }
  .s { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .box { width: 80px; height: 60px; background: var(--surface); border-radius: var(--radius-md); }
  .l { font-size: 11px; color: var(--fg); }
  .n { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); }
</style></head>
<body>
  <div class="s"><div class="box" style="box-shadow:var(--shadow-xs)"></div><div class="l">xs</div></div>
  <div class="s"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="l">sm</div></div>
  <div class="s"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="l">md</div></div>
  <div class="s"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="l">lg</div></div>
  <div class="s"><div class="box" style="box-shadow:var(--shadow-glow);background:var(--pix-gradient)"></div><div class="l">glow</div></div>
</body></html>
